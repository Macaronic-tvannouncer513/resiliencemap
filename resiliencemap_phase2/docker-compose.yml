services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resiliencemap}
      POSTGRES_USER: ${POSTGRES_USER:-resiliencemap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resiliencemap}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiliencemap}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resiliencemap}:${POSTGRES_PASSWORD:-resiliencemap}@db:5432/${POSTGRES_DB:-resiliencemap}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resiliencemap}:${POSTGRES_PASSWORD:-resiliencemap}@db:5432/${POSTGRES_DB:-resiliencemap}
    depends_on:
      db:
        condition: service_healthy
    command: python -m scripts.run_scheduler

volumes:
  pgdata:
