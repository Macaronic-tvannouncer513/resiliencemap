name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: resiliencemap_test
          POSTGRES_USER: resiliencemap
          POSTGRES_PASSWORD: resiliencemap
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run linting
        run: |
          ruff check .
          black --check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://resiliencemap:resiliencemap@localhost:5432/resiliencemap_test
        run: pytest --cov=app --cov=ingestion --cov=processing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resiliencemap:${{ github.sha }} .
